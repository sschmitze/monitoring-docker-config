networks:
  default:
    external: false
    attachable: false
  traefik:
    name: traefik
    external: true

services:
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    user: "1000:1000"
    volumes:
      - ./prometheus/config:/etc/prometheus/
      - ./prometheus/data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.size=1GB"
    networks:
      - default
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    image: grafana/grafana
    container_name: grafana
    user: "1000:1000"
    depends_on:
      - prometheus
    volumes:
      - ./grafana/data:/var/lib/grafana
      - ./grafana/provisioning/:/etc/grafana/provisioning/
    environment:
      GF_SERVER_ROOT_URL: "https://${GRAFANA_ENTRYPOINT}"
      GF_SERVER_DOMAIN: "${GRAFANA_ENTRYPOINT}"
      GF_SERVER_ENFORCE_DOMAIN: "true"
      GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION: "true"
      GF_SECURITY_COOKIE_SECURE: "true"
      GF_SECURITY_COOKIE_SAMESITE: "lax"
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_SECURITY_STRICT_TRANSPORT_SECURITY: "true"
      GF_SECURITY_X_CONTENT_TYPE_OPTIONS: "true"
      GF_SECURITY_X_XSS_PROTECTION: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
      GF_ANALYTICS_CHECK_FOR_PLUGIN_UPDATES: "true" 

      GF_INSTALL_PLUGINS: grafana-piechart-panel
    labels:
      - "traefik.docker.network=traefik"
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.entrypoints=internal"
      - "traefik.http.routers.grafana.rule=Host(`${GRAFANA_ENTRYPOINT}`)"
      - "traefik.http.routers.grafana.tls=true"
      - "traefik.http.routers.grafana.tls.certresolver=myhttpchallenge"
      - "traefik.http.routers.grafana.service=grafana"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    networks:
      - default
      - traefik
    restart: unless-stopped
    logging:
      options:
        max-size: "10m"
        max-file: "3"
