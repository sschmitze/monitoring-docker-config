# config file version
apiVersion: 1

# list of datasources that should be deleted from the database
deleteDatasources:
  - name: Prometheus
    orgId: 1

# list of datasources to insert/update depending
datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"        # match your prometheus.yml scrape_interval
      httpMethod: POST           # handles larger queries better
      manageAlerts: true
      prometheusType: Prometheus
      prometheusVersion: "3.5.0" # match your image tag
