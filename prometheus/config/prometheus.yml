global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "my-project"

#rule_files:
#  - "alert.rules"

scrape_configs:
  - job_name: "prometheus"
    scrape_interval: 5s
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: traefik
    scrape_interval: 1m
    metrics_path: /metrics
    static_configs:
      - targets: ["traefik.example.com"]
    scheme: "https"
    basic_auth:
      username_file: /run/secrets/traefik_username
      password_file: /run/secrets/traefik_password